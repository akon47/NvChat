name: release

# 태그(v*)를 푸시하면 단일 exe 를 빌드해 GitHub Releases 에 자동 업로드한다.
# 예: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags: [ 'v*' ]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (예: v1.0.0)'
        required: true

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish single-file exe
        run: dotnet publish NvChat/NvChat.csproj -c Release -o publish

      # 앱 내 자동 업데이트가 내려받은 파일을 검증하는 데 쓴다.
      - name: Compute checksum
        shell: pwsh
        run: |
          $hash = (Get-FileHash publish/NvChat.exe -Algorithm SHA256).Hash.ToLower()
          "$hash  NvChat.exe" | Out-File -Encoding ascii -NoNewline publish/NvChat.exe.sha256

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: NvChat ${{ github.event.inputs.tag || github.ref_name }}
          draft: false
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            publish/NvChat.exe
            publish/NvChat.exe.sha256
          body: |
            ## NvChat ${{ github.event.inputs.tag || github.ref_name }}

            아래 **`NvChat.exe`** 하나만 내려받아 실행하세요. (.NET 설치 불필요 · Windows x64)
            Download the single **`NvChat.exe`** below and run it. (No .NET required · Windows x64)

            > 첫 실행 시 [build.nvidia.com](https://build.nvidia.com) API 키가 필요합니다 — 설정 창에서 입력하세요.
            > A [build.nvidia.com](https://build.nvidia.com) API key is required on first launch — enter it in Settings.

            ---
