name: build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Release 는 self-contained(win-x64) 이므로 Release 컨텍스트에서 복원까지 함께 수행한다.
      # (별도 restore + --no-restore 로 나누면 런타임 팩이 복원되지 않아 실패한다.)
      - name: Build (Release)
        run: dotnet build NvChat/NvChat.csproj -c Release
